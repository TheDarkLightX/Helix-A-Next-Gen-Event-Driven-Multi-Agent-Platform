ir_version: "esso-ir/v1"
meta:
  model_id: "autopilot_guard"
  created_by: "helix"
  seed: 0
  notes: "Deterministic autopilot guard: off/assist/auto with bounded on-chain and policy simulation guardrails."
observables:
  state_vars: ["mode", "evaluations", "denied", "decision_kind", "denial_reason"]
  effects: []
types: []
state_vars:
  - id: "mode"
    role: "control"
    type:
      kind: "enum"
      symbols: ["Off", "Assist", "Auto"]
  - id: "allow_onchain"
    role: "control"
    type: { kind: "bool" }
  - id: "require_onchain_confirmation"
    role: "control"
    type: { kind: "bool" }
  - id: "require_onchain_dry_run"
    role: "control"
    type: { kind: "bool" }
  - id: "max_policy_commands"
    role: "data"
    type: { kind: "int", min: 1, max: 4 }
  - id: "evaluations"
    role: "data"
    type: { kind: "int", min: 0, max: 15 }
  - id: "denied"
    role: "data"
    type: { kind: "int", min: 0, max: 15 }
  - id: "decision_kind"
    role: "control"
    type:
      kind: "enum"
      symbols: ["ConfigUpdated", "Allow", "Deny"]
  - id: "requires_confirmation"
    role: "data"
    type: { kind: "bool" }
  - id: "denial_reason"
    role: "control"
    type:
      kind: "enum"
      symbols:
        [
          "None",
          "ModeOff",
          "AssistRequiresConfirmation",
          "PolicyCommandLimit",
          "OnchainDisabled",
          "OnchainRequiresConfirmation",
          "DryRunRequired",
        ]
invariants:
  - id: "DeniedNeverExceedsEvaluations"
    kind: "safety"
    expr:
      op: "<="
      args: [{ var: "denied" }, { var: "evaluations" }]
  - id: "RequiresConfirmationOnlyForAllow"
    kind: "safety"
    expr:
      op: "=>"
      args:
        - op: "not"
          args:
            - op: "="
              args: [{ var: "decision_kind" }, { enum: "Allow" }]
        - op: "="
          args: [{ var: "requires_confirmation" }, { bool: false }]
  - id: "AllowHasNoReason"
    kind: "safety"
    expr:
      op: "=>"
      args:
        - op: "="
          args: [{ var: "decision_kind" }, { enum: "Allow" }]
        - op: "and"
          args:
            - op: "="
              args: [{ var: "denial_reason" }, { enum: "None" }]
            - op: "="
              args:
                [
                  { var: "requires_confirmation" },
                  {
                    op: "=",
                    args: [{ var: "mode" }, { enum: "Assist" }],
                  },
                ]
  - id: "DenyHasReason"
    kind: "safety"
    expr:
      op: "=>"
      args:
        - op: "="
          args: [{ var: "decision_kind" }, { enum: "Deny" }]
        - op: "not"
          args:
            - op: "="
              args: [{ var: "denial_reason" }, { enum: "None" }]
  - id: "ConfigUpdateHasNoReason"
    kind: "safety"
    expr:
      op: "=>"
      args:
        - op: "="
          args: [{ var: "decision_kind" }, { enum: "ConfigUpdated" }]
        - op: "="
          args: [{ var: "denial_reason" }, { enum: "None" }]
init:
  - var: "mode"
    expr: { enum: "Assist" }
  - var: "allow_onchain"
    expr: { bool: false }
  - var: "require_onchain_confirmation"
    expr: { bool: true }
  - var: "require_onchain_dry_run"
    expr: { bool: true }
  - var: "max_policy_commands"
    expr: { const: 4 }
  - var: "evaluations"
    expr: { const: 0 }
  - var: "denied"
    expr: { const: 0 }
  - var: "decision_kind"
    expr: { enum: "ConfigUpdated" }
  - var: "requires_confirmation"
