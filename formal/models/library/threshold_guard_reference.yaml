ir_version: "esso-ir/v1"
meta:
  model_id: "threshold_guard_template"
  created_by: "helix"
  seed: 0
  notes: "Generic deterministic threshold guard used by expanded agent classes."
observables:
  state_vars: ["score"]
  effects: []
types: []
state_vars:
  - id: "score"
    role: "data"
    type: { kind: "int", min: 0, max: 3 }
invariants:
  - id: "ScoreRange"
    kind: "safety"
    expr:
      op: "and"
      args:
        - op: "<="
          args: [{ const: 0 }, { var: "score" }]
        - op: "<="
          args: [{ var: "score" }, { const: 3 }]
init:
  - var: "score"
    expr: { const: 0 }
actions:
  - id: "evaluate_allow"
    params: []
    guard:
      op: "<="
      args: [{ var: "score" }, { const: 2 }]
    updates:
      - var: "score"
        expr: { var: "score" }
    effects: {}
  - id: "evaluate_block"
    params: []
    guard:
      op: "="
      args: [{ var: "score" }, { const: 3 }]
    updates:
      - var: "score"
        expr: { const: 3 }
    effects: {}
  - id: "reset"
    params: []
    guard:
      op: "="
      args: [{ const: 1 }, { const: 1 }]
    updates:
      - var: "score"
        expr: { const: 0 }
    effects: {}
refinement:
  state_abstraction:
    - var: "score"
      expr: { var: "score" }
